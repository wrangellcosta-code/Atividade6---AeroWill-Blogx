        <nav>
            <ul>

        <section>
            <h2>Entre em Contato</h2>
            <p>Envie sua mensagem para a equipe do AeroWill. <br>
                Fique à vontade para compartilhar sugestões, dúvidas ou
                ideias sobre o mundo da aviação.</p>

            <form>
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>
                <div class="form-group">
                    <label for="assunto">Assunto:</label>
                    <input type="text" id="assunto" placeholder="Assunto da mensagem">
                </div>
                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" placeholder="Escreva sua mensagem aqui..."></textarea>
                </div>
                <button type="submit">Enviar mensagem</button>
            </form>

        </section>

    </div>

</body>
